    const [editMode,setEditMode]=useState(false);
    const [showArchive,setShowArchive]=useState(false);
    const [previewImg,setPreviewImg]=useState(null);
    const resizeRef=useRef({x:0,w:280});

    // ─── Editable Data ───
    const [freqData,setFreqData]=useState(INIT_FREQ);
    const [energyEntries,setEnergyEntries]=useState(()=>buildEnergyEntries());
    const [spotProgressData,setSpotProgressData]=useState(()=>buildSpotProgressEntries());
    const [capData,setCapData]=useState(INIT_CAPACITY);
    const [resEndow,setResEndow]=useState(INIT_RESOURCE);
    const [resMetric,setResMetric]=useState('wind');
    const [resInput,setResInput]=useState('');
    // Province annotations: {provinceName: {markers:[], routes:[], notes:[], legend:[]}}
    const [annotations,setAnnotations]=useState({});
    // Grid uploads: {provinceName: [{id,src,name,updatedAt}]}
    const [gridUploads,setGridUploads]=useState({});
    // Custom color scales
    const [colorScales,setColorScales]=useState({
        frequency:['#8CC7FF','#53A8FF','#2B86F6','#1B64D8','#0E46A5'],
        energy:['#BFE2FF','#53A8FF','#2B86F6','#1B64D8','#0E46A5'],
        spotProgress:['#dbeafe','#93c5fd','#60a5fa','#3b82f6','#1d4ed8'],
        capacity:['#fde68a','#fbbf24','#f59e0b','#d97706','#92400e'],
        resource:['#d1fae5','#6ee7b7','#34d399','#10b981','#047857']
    });
    // Province tool state
    const [annoTool,setAnnoTool]=useState(null); // null | 'marker' | 'route' | 'note'
    const [annoColor,setAnnoColor]=useState('#22c55e');
    const [annoLabel,setAnnoLabel]=useState('');
    const [routeStart,setRouteStart]=useState(null);

    const activeDataKey=useMemo(()=>{
        if(marketType==='energy')return energyView==='spot-progress'?'spotProgress':'energy';
        return marketType;
    },[marketType,energyView]);
    const sidebarTitle=useMemo(()=>{
        if(viewMode==='province')return editMode?'标注工具 & 图层管理':'省级图例';
        if(marketType==='frequency')return '调频辅助服务图例';
        if(marketType==='energy')return energyView==='spot-progress'?'现货进程图例':'电能量价差图例';
        if(marketType==='capacity')return '容量电价图例';
        if(marketType==='resource')return '资源禀赋图例';
        return '图例 & 控制';
    },[viewMode,editMode,marketType,energyView]);

    // ─── Derived ───
    const getEntry=(name)=>{
        const datasets={frequency:freqData,energy:energyEntries,spotProgress:spotProgressData,capacity:capData};
        const ds=datasets[activeDataKey];
        return ds?.[name]||null;
    };

    const getOrDefault=(name)=>getEntry(name)||makeDefaultEntry(name);

    // Color helper
    const getColor=(value,min,max,palette)=>{
        const span=max-min||1;
        const ratio=Math.min(1,Math.max(0,(value-min)/span));
        return palette[Math.min(palette.length-1,Math.floor(ratio*(palette.length-1)))];
    };

    // ─── Resource computed ───
    const resMetrics=useMemo(()=>{const k=new Set();Object.values(resEndow).forEach(i=>Object.keys(i).forEach(x=>k.add(x)));return Array.from(k);},[resEndow]);
    const resRange=useMemo(()=>{const v=Object.values(resEndow).map(x=>Number(x?.[resMetric])||0);return v.length?{min:Math.min(...v),max:Math.max(...v)}:{min:0,max:1};},[resEndow,resMetric]);

    const resData=useMemo(()=>{
        const out={};
        Object.entries(resEndow).forEach(([prov,metrics])=>{
            const val=Number(metrics?.[resMetric])||0;
            const total=Object.values(metrics).reduce((s,v)=>s+(Number(v)||0),0);
            const pieData=Object.entries(metrics).map(([k,v])=>({name:RES_LABELS[k]||k,value:Number(v)||0})).sort((a,b)=>b.value-a.value);
            out[prov]={title:`${prov} 资源禀赋`,totalVolume:`${RES_LABELS[resMetric]}: ${val} GW`,
                marketVolumeDisplay:`合计装机约${total.toFixed(1)} GW`,tags:['资源禀赋'],
                resourcePieData:pieData,details:pieData.map(i=>({label:i.name,value:`${i.value} GW`})),mapValue:val};
        });
        return out;
    },[resEndow,resMetric]);

    // Freq range
    const freqRange=useMemo(()=>{
        const vals=Object.values(freqData).map(d=>d.mapValue||0).filter(v=>v>0);
        return vals.length?{min:Math.min(...vals),max:Math.max(...vals)}:{min:0,max:5000};
    },[freqData]);

    // Capacity range
    const capRange=useMemo(()=>{
        const vals=Object.values(capData).map(d=>d.mapValue||0).filter(v=>v>0);
        return vals.length?{min:Math.min(...vals),max:Math.max(...vals)}:{min:0,max:330};
    },[capData]);

    // Energy range
    const energyRange=useMemo(()=>{
        const vals=Object.values(energyEntries).map(d=>d.mapValue||0).filter(v=>v>0);
        return vals.length?{min:Math.min(...vals),max:Math.max(...vals)}:{min:0,max:1};
    },[energyEntries]);

    // Current data
    const currentPalette=colorScales[activeDataKey]||colorScales.frequency;

    // Tiered provinces for frequency
    const tier1=['江苏省','浙江省','安徽省','山东省'];
    const tier2=['贵州省','云南省','广西壮族自治区','湖南省','湖北省','江西省','内蒙古自治区'];
    const tier3=['新疆维吾尔自治区','黑龙江省','吉林省','辽宁省','青海省'];

    // ─── Generate Map Data ───
    const generateMapData=()=>{
        const data=[];
        if(marketType==='frequency'){
            Object.entries(freqData).forEach(([name,d])=>{
                if(d.mapValue>0){
                    const color=d.color||getColor(d.mapValue,freqRange.min,freqRange.max,currentPalette);
                    data.push({name,value:d.mapValue,itemStyle:{areaColor:color,borderColor:'#fff',borderWidth:1.2},emphasis:{itemStyle:{areaColor:hoverColor}}});
                }
            });
            tier1.forEach(n=>!freqData[n]&&data.push({name:n,value:-3,itemStyle:{areaColor:'#52525b',borderColor:'#fff',borderWidth:1},emphasis:{itemStyle:{areaColor:hoverColor}}}));
            tier2.forEach(n=>!freqData[n]&&data.push({name:n,value:-2,itemStyle:{areaColor:'#9ca3af',borderColor:'#fff',borderWidth:1},emphasis:{itemStyle:{areaColor:hoverColor}}}));
            tier3.forEach(n=>!freqData[n]&&data.push({name:n,value:-1,itemStyle:{areaColor:'#e5e7eb',borderColor:'#fff',borderWidth:1},emphasis:{itemStyle:{areaColor:hoverColor}}}));
        } else if(marketType==='capacity'){
            Object.entries(capData).forEach(([name,d])=>{
                if(d.mapValue>0){
                    const color=d.color||getColor(d.mapValue,capRange.min,capRange.max,currentPalette);
                    data.push({name,value:d.mapValue,itemStyle:{areaColor:color,borderColor:'#fff',borderWidth:1.2},emphasis:{itemStyle:{areaColor:hoverColor}}});
                }
            });
        } else if(marketType==='energy'){
            const source=energyView==='spot-progress'?spotProgressData:energyEntries;
            Object.entries(source).forEach(([name,d])=>{
                if(d.mapValue>0){
                    const color=energyView==='spot-progress'
                        ?(d.color||'#e2e8f0')
                        :(d.color||getColor(d.mapValue,energyRange.min,energyRange.max,currentPalette));
                    data.push({name,value:d.mapValue,itemStyle:{areaColor:color,borderColor:'#fff',borderWidth:1.2},emphasis:{itemStyle:{areaColor:hoverColor}}});
                }
            });
        } else if(marketType==='resource'){
            Object.entries(resData).forEach(([name,d])=>{
                if(d.mapValue>0){
                    const color=getColor(d.mapValue,resRange.min,resRange.max,currentPalette);
                    data.push({name,value:d.mapValue,itemStyle:{areaColor:color,borderColor:'#fff',borderWidth:1.2},emphasis:{itemStyle:{areaColor:hoverColor}}});
                }
            });
        }
        return data;
    };

    // ─── Load Map ───
    const fetchFirstJSON=async(urls)=>{
        let lastErr=null;
        for(const u of urls){
            try{
                const ctrl=new AbortController();
                const timer=setTimeout(()=>ctrl.abort(),10000);
                const resp=await fetch(u,{signal:ctrl.signal,cache:'no-store'});
                clearTimeout(timer);
                if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            }catch(err){lastErr=err;}
        }
        throw(lastErr||new Error('地图数据加载失败'));
    };

    const loadMap=async(mode,provinceName=null)=>{
        setLoading(true);
        try{
            let urls=[
                'https://fastly.jsdelivr.net/npm/echarts@5/map/json/china.json',
                'https://cdn.jsdelivr.net/npm/echarts@5/map/json/china.json',
                'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json'
            ];
            let mapName='china';
            if(mode==='province'&&provinceName){
                const code=ADCODE[provinceName];
                const py=PROVINCE_PINYIN[provinceName];
                if(code){
                    urls=[
                        ...(py?[
                            `https://fastly.jsdelivr.net/npm/echarts@5/map/json/province/${py}.json`,
                            `https://cdn.jsdelivr.net/npm/echarts@5/map/json/province/${py}.json`
                        ]:[]),
                        `https://geo.datav.aliyun.com/areas_v3/bound/${code}_full.json`
                    ];
                    mapName=provinceName;
                }
            }
            const geo=await fetchFirstJSON(urls);
            if(!window.echarts)return;
            window.echarts.registerMap(mapName,geo);
            if(chartRef.current)chartRef.current.dispose();
            const chart=window.echarts.init(mapRef.current);
            chartRef.current=chart;

            let option={};
            if(mode==='china'){
                option={
                    backgroundColor:'transparent',
                    tooltip:{trigger:'item',backgroundColor:'rgba(255,255,255,.96)',borderColor:'#e2e8f0',borderWidth:1,padding:14,textStyle:{color:'#1e293b'},
                        formatter:(params)=>{
                            if(params.value===undefined||params.value===null)return`<b>${params.name}</b><div style="font-size:11px;color:#94a3b8;margin-top:4px">点击查看详情 / 双击进入省级</div>`;
                            const entry=getEntry(params.name)||(marketType==='resource'?resData[params.name]:null);
                            if(!entry)return`<b>${params.name}</b><div style="font-size:11px;color:#94a3b8;margin-top:4px">暂无数据 · 点击查看 · 双击进入省级</div>`;
                            return`<div style="font-weight:700;font-size:13px;margin-bottom:4px;">${params.name}</div>`
                                +(entry.totalVolume?`<div style="font-size:12px;color:#475569;margin-bottom:4px;">${entry.totalVolume}</div>`:'')
                                +`<div style="font-size:11px;color:#2563eb;border-top:1px solid #f1f5f9;padding-top:4px;margin-top:4px;">点击查看详情 · 双击进入省级地图</div>`;
                        }},
                    series:[{name:'市场',type:'map',map:'china',roam:true,zoom:1.2,center:[104.114,37.55],
                        label:{show:true,fontSize:10,color:'rgba(0,0,0,.4)'},
                        itemStyle:{areaColor:'#f1f5f9',borderColor:'#cbd5e1',borderWidth:1},
                        emphasis:{label:{show:true,color:'#854d0e'},itemStyle:{areaColor:hoverColor}},
                        data:generateMapData(),selectedMode:false}]
                };
            } else {
                // Province view: show annotations
                const annos=annotations[provinceName]||{markers:[],routes:[],notes:[]};
                const markerData=annos.markers?.map(m=>({
                    name:m.label,value:[...m.coord,100],
                    symbol:MARKER_PRESETS.find(p=>p.type===m.preset)?.symbol||'circle',
                    symbolSize:16,
                    itemStyle:{color:m.color||'#22c55e',borderColor:'#fff',borderWidth:2,shadowBlur:4,shadowColor:'rgba(0,0,0,.3)'},
                    label:{show:true,formatter:m.label,position:'right',fontSize:11,color:'#1e293b',fontWeight:500},
                    tooltipData:m
                }))||[];
                const routeData=annos.routes?.map(r=>({
                    coords:r.coords,
                    lineStyle:{color:r.color||'#334155',width:r.width||2.5,opacity:.85,type:r.dashed?'dashed':'solid'},
                    tooltipData:r
                }))||[];

                option={
                    backgroundColor:'transparent',
                    tooltip:{trigger:'item',backgroundColor:'rgba(255,255,255,.96)',borderColor:'#e2e8f0',borderWidth:1,padding:12,textStyle:{color:'#1e293b'},
                        formatter:p=>{
                            const d=p.data?.tooltipData;
                            if(!d)return p.name;
                            return`<div style="font-weight:700;color:${d.color||p.color}">${d.label||d.name||''}</div>`
                                +(d.desc?`<div style="font-size:12px;color:#64748b;">${d.desc}</div>`:'')
                                +(d.preset?`<div style="font-size:10px;color:#94a3b8;">${MARKER_PRESETS.find(x=>x.type===d.preset)?.label||''}</div>`:'');
                        }},
                    geo:{map:mapName,roam:true,zoom:1.0,
                        label:{show:true,color:'#64748b'},
                        itemStyle:{areaColor:'#e8ecf1',borderColor:'#94a3b8',borderWidth:1.5},
                        emphasis:{itemStyle:{areaColor:hoverColor},label:{color:'#854d0e'}}},
                    series:[
                        {name:'路线',type:'lines',coordinateSystem:'geo',data:routeData,
                            lineStyle:{width:2.5,opacity:.85},
                            effect:{show:true,symbol:'arrow',symbolSize:7,period:8},zlevel:1.8},
                        {name:'标注',type:'effectScatter',coordinateSystem:'geo',data:markerData,
                            showEffectOn:'render',rippleEffect:{brushType:'fill',scale:2},zlevel:2}
                    ]
                };
                // Add note labels as graphic elements
                if(annos.notes?.length){
                    option.graphic=annos.notes.map(n=>({
                        type:'text',left:n.x||100,top:n.y||100,
                        style:{text:n.text||'',fill:n.color||'#1e293b',fontSize:13,fontWeight:500,
                            backgroundColor:'rgba(255,255,255,.85)',padding:[4,8],borderRadius:4,
                            borderWidth:1,borderColor:'#e2e8f0'}
                    }));
                }
            }

            chart.setOption(option);
            setLoading(false);

            chart.off('click');
            chart.on('click',(params)=>{
                if(mode==='province'){
                    // In province mode, clicking on the map adds annotations
                    if(annoTool&&editMode){
                        const coord=chart.convertFromPixel('geo',[params.event.offsetX,params.event.offsetY]);
                        if(!coord||!isFinite(coord[0]))return;
                        addAnnotation(provinceName,coord,params.event.offsetX,params.event.offsetY);
                    }
                    return;
                }
                // China mode: show sidebar for ANY province
                if(params.componentType==='series'&&params.seriesType==='map'){
                    setSelName(params.name);
                }
            });
            chart.off('dblclick');
            chart.on('dblclick',(params)=>{
                if(mode!=='china'||params.componentType!=='series'||params.seriesType!=='map')return;
                if(ADCODE[params.name]){
                    setCurProvince(params.name);setSelName(params.name);setViewMode('province');
                }
            });
        }catch(e){
            console.error('Map error:',e);
            setLoading(false);
            if(mode==='province'&&provinceName){
                alert(`${provinceName}地图加载失败，已返回全国地图。`);
                setViewMode('china');
                setCurProvince(null);
            }else{
                alert('地图数据加载失败，请检查网络后刷新页面重试。');
            }
        }
    };

    const addAnnotation=(prov,coord,px,py)=>{
        setAnnotations(prev=>{
            const next={...prev};
            const a={...(next[prov]||{markers:[],routes:[],notes:[]})};
            if(annoTool==='marker'){
                a.markers=[...(a.markers||[]),{id:Date.now(),coord,label:annoLabel||'新标注',color:annoColor,preset:'C',desc:''}];
            } else if(annoTool==='note'){
                a.notes=[...(a.notes||[]),{id:Date.now(),x:px,y:py,text:annoLabel||'备注',color:annoColor}];
            } else if(annoTool==='route'){
                if(!routeStart){setRouteStart(coord);return next;}
                a.routes=[...(a.routes||[]),{id:Date.now(),coords:[routeStart,coord],label:annoLabel||'路线',color:annoColor,width:2.5}];
                setRouteStart(null);
            }
            next[prov]=a;
            return next;
        });
        // Refresh map
        setTimeout(()=>loadMap('province',prov),50);
    };

    const removeAnnotation=(prov,type,id)=>{
        setAnnotations(prev=>{
            const next={...prev};
            const a={...(next[prov]||{markers:[],routes:[],notes:[]})};
            a[type]=(a[type]||[]).filter(i=>i.id!==id);
            next[prov]=a;
            return next;
        });
        setTimeout(()=>loadMap('province',prov),50);
    };

    // ─── Effects ───
    useEffect(()=>{loadMap(viewMode,curProvince);},[viewMode,curProvince,marketType,energyView,resData,freqData,capData,energyEntries,spotProgressData,colorScales,annotations]);
    useEffect(()=>{setViewMode('china');setCurProvince(null);setSelName(null);setAnnoTool(null);setRouteStart(null);if(marketType!=='energy')setEnergyView('price');},[marketType]);
    useEffect(()=>{if(marketType==='energy'){setViewMode('china');setCurProvince(null);setSelName(null);}},[energyView]);
    useEffect(()=>{const h=()=>chartRef.current?.resize();window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);

    // Pie
    useEffect(()=>{
        const entry=selName&&marketType==='resource'?resData[selName]:null;
        if(!pieRef.current||!entry?.resourcePieData?.length){if(pieInst.current){pieInst.current.dispose();pieInst.current=null;}return;}
        if(!pieInst.current)pieInst.current=echarts.init(pieRef.current);
        pieInst.current.clear();
        pieInst.current.setOption({tooltip:{trigger:'item'},series:[{type:'pie',radius:['38%','68%'],itemStyle:{borderRadius:5,borderColor:'#fff',borderWidth:2},label:{formatter:'{b}: {d}%',color:'#0f172a',fontSize:11},data:entry.resourcePieData}]});
        pieInst.current.resize();
    },[selName,resData,marketType]);

    // Resize
    useEffect(()=>{
        if(!isResizing)return;
        const move=e=>setSidebarW(Math.min(Math.max(resizeRef.current.w+e.clientX-resizeRef.current.x,220),440));
        const up=()=>setIsResizing(false);
        window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
        return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    },[isResizing]);

    // ─── Handlers ───
    const handleBack=()=>{setViewMode('china');setCurProvince(null);setAnnoTool(null);setRouteStart(null);};
    const closeSidebar=()=>setSelName(null);

    const updateEntry=(name,field,value)=>{
        const setters={frequency:setFreqData,energy:setEnergyEntries,spotProgress:setSpotProgressData,capacity:setCapData};
        const setter=setters[activeDataKey];
        if(!setter)return;
        setter(prev=>{
            const entry={...(prev[name]||makeDefaultEntry(name))};
            if(field==='mapValue')entry.mapValue=Number(value)||0;
            else if(field==='color')entry.color=value;
            else if(field==='spotStage'){
                entry.spotStage=value;
                entry.totalVolume=value||'待更新';
                entry.details=[...(entry.details||[])];
                const idx=entry.details.findIndex(i=>i.label==='现货阶段');
                if(idx>-1)entry.details[idx]={...entry.details[idx],value:value||'待填写'};
                else entry.details.unshift({label:'现货阶段',value:value||'待填写'});
            }
            else if(field.startsWith('details.')){
                const[,idx,f]=field.split('.');
                entry.details=[...(entry.details||[])];
                entry.details[Number(idx)]={...(entry.details[Number(idx)]||{}), [f]:value};
            } else entry[field]=value;
            return{...prev,[name]:entry};
        });
    };

    const addDetail=(name)=>{
        const setters={frequency:setFreqData,energy:setEnergyEntries,spotProgress:setSpotProgressData,capacity:setCapData};
        const setter=setters[activeDataKey];
        if(!setter)return;
        setter(prev=>{
            const entry={...(prev[name]||makeDefaultEntry(name))};
            entry.details=[...(entry.details||[]),{label:'新字段',value:'待填写'}];
            return{...prev,[name]:entry};
        });
    };

    const removeDetail=(name,idx)=>{
        const setters={frequency:setFreqData,energy:setEnergyEntries,spotProgress:setSpotProgressData,capacity:setCapData};
        const setter=setters[activeDataKey];
        if(!setter)return;
        setter(prev=>{
            const entry={...(prev[name]||makeDefaultEntry(name))};
            entry.details=(entry.details||[]).filter((_,i)=>i!==idx);
            return{...prev,[name]:entry};
        });
    };

    const addTag=(name,tag)=>{
        const setters={frequency:setFreqData,energy:setEnergyEntries,spotProgress:setSpotProgressData,capacity:setCapData};
        const setter=setters[activeDataKey];
        if(!setter)return;
        setter(prev=>{
            const entry={...(prev[name]||makeDefaultEntry(name))};
            entry.tags=[...(entry.tags||[]),tag];
            return{...prev,[name]:entry};
        });
    };

    // Export
    const handleExportHTML=()=>{
        const html=document.documentElement.outerHTML;
        const blob=new Blob([`<!DOCTYPE html>${html}`],{type:'text/html;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download='电力市场热力图_导出.html';a.click();URL.revokeObjectURL(url);
    };
    const handleExportJSON=()=>{
        const payload={freqData,energyEntries,spotProgressData,capData,resEndow,annotations,gridUploads,colorScales};
        const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
        const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='heatmap-data.json';a.click();URL.revokeObjectURL(url);
    };
    const handleImportJSON=(e)=>{
        const file=e.target.files?.[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=(ev)=>{try{
            const j=JSON.parse(ev.target.result);
            if(j.freqData)setFreqData(j.freqData);
            if(j.energyEntries)setEnergyEntries(j.energyEntries);
            if(j.spotProgressData)setSpotProgressData(j.spotProgressData);
            if(j.capData)setCapData(j.capData);
            if(j.resEndow)setResEndow(j.resEndow);
            if(j.annotations)setAnnotations(j.annotations);
            if(j.gridUploads)setGridUploads(j.gridUploads);
            if(j.colorScales)setColorScales(j.colorScales);
        }catch{alert('导入失败');}};
        reader.readAsText(file);e.target.value='';
    };

    const handleGridUpload=(prov,files)=>{
        if(!editMode)return;
        files.forEach(f=>{const r=new FileReader();r.onload=e=>{setGridUploads(p=>({...p,[prov]:[...(p[prov]||[]),{id:`${f.name}-${Date.now()}`,src:e.target.result,name:f.name,updatedAt:new Date().toISOString()}]}));};r.readAsDataURL(f);});
    };

    // ─── Derived Vars ───
    const tabs=[
        {key:'frequency',label:'二次调频',icon:<Activity size={14}/>,accent:'blue'},
        {key:'energy',label:'电能量',icon:<BatteryC size={14}/>,accent:'indigo'},
        {key:'capacity',label:'容量电价',icon:<DollarSign size={14}/>,accent:'amber'},
        {key:'resource',label:'资源禀赋',icon:<Layers size={14}/>,accent:'emerald'}
    ];
    const gradients={frequency:'from-[#001A72] to-[#66D4FF]',energy:'from-[#312e81] to-[#818cf8]',capacity:'from-amber-700 to-yellow-300',resource:'from-emerald-700 to-lime-300'};
    const mainTitle=viewMode==='province'?`${shortName(curProvince)} 省级详情`:marketType==='frequency'?'二次调频市场热力图':marketType==='capacity'?'容量电价热力图':marketType==='resource'?'资源禀赋热力图':energyView==='price'?'电能量价差热力图':'现货市场进程';

    const selEntry=useMemo(()=>{
        if(!selName)return null;
        if(marketType==='resource')return resData[selName]||makeDefaultEntry(selName);
        return getOrDefault(selName);
    },[selName,marketType,energyView,freqData,energyEntries,spotProgressData,capData,resData]);

    const provAnnos=curProvince?annotations[curProvince]||{markers:[],routes:[],notes:[]}:{markers:[],routes:[],notes:[]};
    const provGrids=(prov)=>[...(gridUploads[prov]||[])];


    // ═══ RENDER ═══
    return(
    <div className="flex flex-col h-screen bg-[#eef1f5] overflow-hidden relative">
        {/* ── Header ── */}
        <header className="glass border-b border-slate-200/80 px-5 py-2.5 flex items-center justify-between z-20 shrink-0">
            <div className="flex items-center gap-3">
                {viewMode==='province'?(
                    <button onClick={handleBack} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-medium transition-colors"><ArrowLeft size={15}/> 返回全国</button>
                ):(
                    <div className={`bg-gradient-to-br ${gradients[marketType]} p-2 rounded-xl text-white shadow-md`}><Activity size={20}/></div>
                )}
                <div>
                    <h1 className="text-[15px] font-bold text-slate-900 leading-tight">{mainTitle}</h1>
                    <div className="text-[10px] text-slate-400 mt-0.5">{viewMode==='province'?'点击地图添加标注（编辑模式）':'单击查看详情 · 双击进入省级地图'}</div>
                </div>
            </div>
            <div className="flex items-center gap-2">
                <button onClick={()=>setEditMode(!editMode)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${editMode?'bg-slate-900 text-white border-slate-800':'bg-white text-slate-600 border-slate-200 hover:border-slate-300'}`}>
                    {editMode?<><Edit3 size={12}/> 编辑中</>:<><Eye size={12}/> 查看</>}
                </button>
                {editMode&&<>
                    <button onClick={handleExportHTML} className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 shadow-sm"><Download size={12}/> HTML</button>
                    <button onClick={()=>setShowArchive(true)} className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-bold bg-white text-slate-700 border border-slate-200 hover:border-slate-300"><ArchiveIc size={12}/></button>
                </>}
            </div>
        </header>

        {/* ── Tabs ── */}
        <div className="glass border-b border-slate-200/60 px-5 flex items-center gap-0.5 shrink-0 z-10">
            {tabs.map(t=>(
                <button key={t.key} onClick={()=>setMarketType(t.key)} className={`flex items-center gap-1.5 px-4 py-2.5 text-xs font-bold border-b-2 transition-all ${marketType===t.key?`text-${t.accent}-600 border-current`:'text-slate-400 border-transparent hover:text-slate-600'}`}>
                    {t.icon} {t.label}
                </button>
            ))}
            {marketType==='energy'&&(
                <div className="ml-3 flex items-center gap-0.5 bg-slate-100 rounded-lg p-0.5">
                    <button onClick={()=>setEnergyView('price')} className={`px-3 py-1 rounded-md text-[11px] font-bold ${energyView==='price'?'bg-white text-indigo-700 shadow-sm':'text-slate-500'}`}>价差地图</button>
                    <button onClick={()=>setEnergyView('spot-progress')} className={`px-3 py-1 rounded-md text-[11px] font-bold ${energyView==='spot-progress'?'bg-white text-indigo-700 shadow-sm':'text-slate-500'}`}>现货进程</button>
                </div>
            )}
        </div>

        {/* ── Body ── */}
        <div className="flex-1 relative w-full h-full overflow-hidden">
            <div className="w-full h-full flex">
                {/* Left Sidebar */}
                <div className="absolute left-0 top-0 bottom-0 z-40 glass border-r border-slate-200/80 shadow-lg transition-all duration-300 flex flex-col overflow-hidden" style={{width:sidebarOpen?sidebarW:0,transform:sidebarOpen?'translateX(0)':'translateX(-100%)'}}>
                    <div className="p-3 border-b border-slate-100/80 shrink-0">
                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{sidebarTitle}</span>
                    </div>
                    <div className="p-3 overflow-y-auto flex-1 space-y-4">
                        {viewMode==='china'&&(
                            <div className="space-y-3 fade-in">
                                <div className="flex items-center gap-2">
                                    <div className="h-24 w-2.5 rounded-full shadow-inner" style={{background:`linear-gradient(to bottom, ${currentPalette[currentPalette.length-1]}, ${currentPalette[Math.floor(currentPalette.length/2)]}, ${currentPalette[0]})`}}></div>
                                    <div className="flex flex-col justify-between h-24 text-[11px] text-slate-500">
                                        <span>高</span><span>中</span><span>低</span>
                                    </div>
                                </div>
                                {editMode&&(
                                    <div className="space-y-1.5 bg-slate-50 rounded-lg p-2.5 border border-slate-100">
                                        <div className="text-[10px] font-bold text-slate-500 flex items-center gap-1"><Palette size={11}/>自定义色阶</div>
                                        <div className="flex gap-1 flex-wrap">
                                            {currentPalette.map((c,i)=>(
                                                <input key={i} type="color" value={c} onChange={e=>{
                                                    setColorScales(prev=>{const next={...prev};next[activeDataKey]=[...next[activeDataKey]];next[activeDataKey][i]=e.target.value;return next;});
                                                }} title={`色阶 ${i+1}`}/>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {marketType==='frequency'&&(
                                    <div className="space-y-1 text-[11px] text-slate-500">
                                        <div className="text-[10px] font-bold text-slate-400 uppercase">潜在梯队</div>
                                        <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded bg-[#52525b]"></div>第一梯队</div>
                                        <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded bg-[#9ca3af]"></div>第二梯队</div>
                                        <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded bg-[#e5e7eb]"></div>第三梯队</div>
                                    </div>
                                )}
                                {marketType==='resource'&&(
                                    <div className="space-y-2">
                                        <select value={resMetric} onChange={e=>setResMetric(e.target.value)} className="w-full rounded-md border border-slate-200 bg-white px-2 py-1.5 text-xs focus:outline-none">
                                            {resMetrics.map(k=><option key={k} value={k}>{RES_LABELS[k]||k}</option>)}
                                        </select>
                                        {editMode&&<>
                                            <textarea value={resInput} onChange={e=>setResInput(e.target.value)} placeholder="省份,指标,数值" className="w-full h-14 text-xs rounded-md border border-slate-200 bg-white px-2 py-1 focus:outline-none" rows={2}/>
                                            <button onClick={()=>{if(!resInput.trim())return;resInput.split('\n').filter(Boolean).forEach(l=>{const[p,k,v]=l.split(/[,，]/);const n=parseFloat(v);if(p?.trim()&&k?.trim()&&!isNaN(n))setResEndow(pr=>({...pr,[p.trim()]:{...(pr[p.trim()]||{}),[k.trim()]:n}}));});setResInput('');}} className="w-full bg-emerald-600 text-white text-[11px] font-bold py-1.5 rounded-md hover:bg-emerald-700">应用</button>
                                        </>}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Province-level annotation toolbar */}
                        {viewMode==='province'&&editMode&&(
                            <div className="space-y-3 fade-in">
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">标注工具</div>
                                <div className="grid grid-cols-3 gap-1.5">
                                    {[{key:'marker',icon:<MapPin size={14}/>,label:'标注点'},{key:'route',icon:<Route size={14}/>,label:'路线'},{key:'note',icon:<StickyNote size={14}/>,label:'备注'}].map(t=>(
                                        <button key={t.key} onClick={()=>{setAnnoTool(annoTool===t.key?null:t.key);setRouteStart(null);}}
                                            className={`tool-btn flex flex-col items-center gap-1 py-2 rounded-lg text-[10px] font-bold border transition-all ${annoTool===t.key?'active bg-blue-50 text-blue-700 border-blue-200':'bg-white text-slate-500 border-slate-200 hover:border-slate-300'}`}>
                                            {t.icon}<span>{t.label}</span>
                                        </button>
                                    ))}
                                </div>
                                {annoTool&&(
                                    <div className="space-y-2 bg-blue-50/60 border border-blue-100 rounded-lg p-2.5 fade-in">
                                        <div className="text-[10px] text-blue-700 font-bold">{annoTool==='marker'?'点击地图放置标注':annoTool==='route'?routeStart?'再次点击确定路线终点':'点击地图选择路线起点':'点击地图放置备注'}</div>

                                        <div className="flex items-center gap-1.5">
                                            <span className="text-[10px] text-slate-500">颜色:</span>
                                            <input type="color" value={annoColor} onChange={e=>setAnnoColor(e.target.value)}/>
                                            <div className="flex gap-1 ml-1">
                                                {(annoTool==='marker'?MARKER_PRESETS:[{color:'#334155'},{color:'#16a34a'},{color:'#7e22ce'},{color:'#ef4444'},{color:'#0ea5e9'}]).map((p,i)=>(
                                                    <button key={i} onClick={()=>{setAnnoColor(p.color);if(p.type)setAnnoLabel(p.label||'');}} className="w-5 h-5 rounded-full border-2 border-white shadow-sm hover:scale-110 transition-transform" style={{backgroundColor:p.color}} title={p.label||p.color}/>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {/* Existing annotations list */}
                                {(provAnnos.markers?.length>0||provAnnos.routes?.length>0||provAnnos.notes?.length>0)&&(
                                    <div className="space-y-2">
                                        <div className="text-[10px] font-bold text-slate-400 uppercase">已有标注</div>
                                        {provAnnos.markers?.map(m=>(
                                            <div key={m.id} className="flex items-center justify-between text-[11px] bg-white border border-slate-100 rounded-lg px-2.5 py-1.5">
                                                <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full" style={{backgroundColor:m.color}}/><span className="text-slate-700">{m.label}</span></div>
                                                <button onClick={()=>removeAnnotation(curProvince,'markers',m.id)} className="text-slate-300 hover:text-red-500"><Trash size={12}/></button>
                                            </div>
                                        ))}
                                        {provAnnos.routes?.map(r=>(
                                            <div key={r.id} className="flex items-center justify-between text-[11px] bg-white border border-slate-100 rounded-lg px-2.5 py-1.5">
                                                <div className="flex items-center gap-1.5"><div className="w-4 h-0.5 rounded" style={{backgroundColor:r.color}}/><span className="text-slate-700">{r.label}</span></div>
                                                <button onClick={()=>removeAnnotation(curProvince,'routes',r.id)} className="text-slate-300 hover:text-red-500"><Trash size={12}/></button>
                                            </div>
                                        ))}
                                        {provAnnos.notes?.map(n=>(
                                            <div key={n.id} className="flex items-center justify-between text-[11px] bg-white border border-slate-100 rounded-lg px-2.5 py-1.5">
                                                <div className="flex items-center gap-1.5"><StickyNote size={11} cl="text-slate-400"/><span className="text-slate-700">{n.text}</span></div>
                                                <button onClick={()=>removeAnnotation(curProvince,'notes',n.id)} className="text-slate-300 hover:text-red-500"><Trash size={12}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                        {viewMode==='province'&&!editMode&&(
                            <div className="text-xs text-slate-400 bg-slate-50 rounded-lg p-3 border border-slate-100">切换到编辑模式可在省级地图上添加标注点、输送路线和文字备注。</div>
                        )}
                    </div>
                    {sidebarOpen&&<div className="absolute top-0 right-0 h-full w-1.5 cursor-col-resize hover:bg-blue-200/50" onMouseDown={e=>{resizeRef.current={x:e.clientX,w:sidebarW};setIsResizing(true);}}/>}
                </div>

                <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="absolute top-3 z-30 bg-white/90 backdrop-blur p-1.5 rounded-r-lg shadow-md border border-l-0 border-slate-200 text-slate-500 hover:text-slate-800 transition-all" style={{left:sidebarOpen?sidebarW:0}}>
                    {sidebarOpen?<ChevronL size={14}/>:<ChevronR size={14}/>}
                </button>

                {/* Map */}
                <div className="flex-1 relative">
                    {loading&&<div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 gap-2 bg-[#eef1f5]/80 z-50"><div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div><span className="text-[11px]">加载中…</span></div>}
                    <div ref={mapRef} className="w-full h-full cursor-pointer"/>
                </div>
            </div>

            {/* ── Right Detail Panel ── */}
            <div className={`absolute right-0 top-0 bottom-0 z-30 w-full md:w-[440px] bg-white shadow-2xl md:border-l border-slate-200 transform transition-transform duration-300 flex flex-col ${selName?'translate-x-0':'translate-x-full'}`}>
                {selName&&selEntry&&(
                    <>
                    <div className="p-4 border-b border-slate-100 flex justify-between items-start shrink-0 bg-gradient-to-br from-slate-50 to-white">
                        <div className="flex-1 space-y-2">
                            {editMode?(
                                <input value={selEntry.title||''} onChange={e=>updateEntry(selName,'title',e.target.value)} className="text-lg font-bold text-slate-900 border border-slate-200 rounded-lg px-2 py-1 w-full focus:outline-none ef"/>
                            ):(
                                <h2 className="text-lg font-bold text-slate-800">{selEntry.title||selName}</h2>
                            )}
                            <div className="flex flex-wrap gap-1">
                                {editMode?(
                                    <input value={selEntry.totalVolume||''} onChange={e=>updateEntry(selName,'totalVolume',e.target.value)} className="text-xs border border-blue-200 rounded px-2 py-0.5 bg-blue-50 text-blue-700 font-bold focus:outline-none ef" placeholder="总量"/>
                                ):(
                                    selEntry.totalVolume&&<span className="px-2 py-0.5 rounded text-[11px] font-bold bg-blue-50 text-blue-700 border border-blue-200">{selEntry.totalVolume}</span>
                                )}
                                {(selEntry.tags||[]).map((t,i)=><span key={i} className="px-2 py-0.5 rounded text-[11px] bg-slate-100 text-slate-600 border border-slate-200">{t}</span>)}
                                {editMode&&<button onClick={()=>{const t=prompt('输入标签');if(t)addTag(selName,t);}} className="px-1.5 py-0.5 rounded text-[11px] bg-slate-50 text-slate-400 border border-dashed border-slate-300 hover:border-blue-300 hover:text-blue-500">+标签</button>}
                            </div>
                        </div>
                        <button onClick={closeSidebar} className="p-1.5 hover:bg-slate-100 rounded-full text-slate-400 hover:text-slate-600 ml-2"><XIcon size={18}/></button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {/* Map Value + Color */}
                        {editMode&&marketType!=='resource'&&(
                            <div className="flex items-center gap-3 bg-slate-50 rounded-xl p-3 border border-slate-100">
                                {!(marketType==='energy'&&energyView==='spot-progress')&&(
                                    <div className="flex-1 space-y-1">
                                        <div className="text-[10px] font-bold text-slate-400 uppercase">地图数值</div>
                                        <input type="number" value={selEntry.mapValue||0} onChange={e=>updateEntry(selName,'mapValue',e.target.value)} className="w-full border border-slate-200 rounded px-2 py-1 text-sm font-bold text-slate-900 bg-white focus:outline-none ef"/>
                                    </div>
                                )}
                                <div className="space-y-1">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase">{marketType==='energy'&&energyView==='spot-progress'?'进程填色':'自定义颜色'}</div>
                                    <div className="flex items-center gap-1.5">
                                        <input type="color" value={selEntry.color||currentPalette[Math.floor(currentPalette.length/2)]} onChange={e=>updateEntry(selName,'color',e.target.value)}/>
                                        {selEntry.color&&<button onClick={()=>updateEntry(selName,'color',null)} className="text-[10px] text-slate-400 hover:text-red-500">重置</button>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Description */}
                        <div className="rounded-xl p-3.5 border border-slate-100 bg-slate-50/50">
                            <div className="flex items-center gap-1.5 font-semibold mb-2 text-slate-600 text-sm"><Coins size={16}/>概览</div>
                            {marketType==='energy'&&energyView==='spot-progress'&&(
                                <div className="mb-2.5">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">现货市场阶段</div>
                                    {editMode?(
                                        <input value={selEntry.spotStage||''} onChange={e=>updateEntry(selName,'spotStage',e.target.value)} placeholder="如：连续结算试运行 / 正式运行" className="w-full border border-slate-200 rounded-lg px-2.5 py-2 text-sm font-semibold text-slate-700 focus:outline-none ef bg-white"/>
                                    ):(
                                        <div className="inline-flex px-2.5 py-1 rounded-md bg-indigo-50 text-indigo-700 border border-indigo-200 text-xs font-bold">{selEntry.spotStage||'待更新'}</div>
                                    )}
                                </div>
                            )}
                            {editMode?(
                                <textarea className="w-full border border-slate-200 rounded-lg px-2.5 py-2 text-sm focus:outline-none ef bg-white" rows={3} value={selEntry.marketVolumeDisplay||''} onChange={e=>updateEntry(selName,'marketVolumeDisplay',e.target.value)}/>
                            ):(
                                <p className="text-sm text-slate-700 leading-relaxed">{selEntry.marketVolumeDisplay}</p>
                            )}
                        </div>

                        {/* Pie chart for resource */}
                        {selEntry.resourcePieData&&<div ref={pieRef} className="w-full h-48"/>}

                        {/* Grid images */}
                        {provGrids(selName).length>0&&(
                            <div className="space-y-2">
                                <div className="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-1"><Layers size={11}/>网架/规划</div>
                                <div className="grid gap-2 sm:grid-cols-2">{provGrids(selName).map(item=>(
                                    <div key={item.id} className="bg-slate-50 rounded-lg border border-slate-100 overflow-hidden">
                                        <img src={item.src} alt="" className="w-full h-28 object-cover cursor-pointer" onClick={()=>setPreviewImg(item)}/>
                                        <div className="text-[10px] text-slate-500 px-2 py-1 truncate">{item.name}</div>
                                    </div>
                                ))}</div>
                            </div>
                        )}
                        {editMode&&(
                            <label className="flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold bg-blue-50 text-blue-700 border border-blue-200 cursor-pointer hover:bg-blue-100 transition-colors">
                                <Upload size={13}/>上传网架/规划图
                                <input type="file" accept="image/*" multiple onChange={e=>handleGridUpload(selName,Array.from(e.target.files||[]))} className="hidden"/>
                            </label>
                        )}

                        {/* Details */}
                        <div className="space-y-2">
                            <div className="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-1"><BarChart3 size={11}/>详细数据</div>
                            <div className="bg-slate-50 rounded-xl border border-slate-100 divide-y divide-slate-100">
                                {(selEntry.details||[]).map((item,idx)=>(
                                    <div key={idx} className="p-3 flex flex-col gap-1">
                                        {editMode?(
                                            <div className="flex items-center gap-1.5">
                                                <input value={item.label} onChange={e=>updateEntry(selName,`details.${idx}.label`,e.target.value)} className="flex-1 border border-slate-200 rounded px-2 py-0.5 text-[11px] text-slate-500 bg-white focus:outline-none ef" placeholder="字段名"/>
                                                <button onClick={()=>removeDetail(selName,idx)} className="text-slate-300 hover:text-red-500"><Trash size={12}/></button>
                                            </div>
                                        ):(
                                            <span className="text-[11px] text-slate-400">{item.label}</span>
                                        )}
                                        {editMode?(
                                            <input value={item.value} onChange={e=>updateEntry(selName,`details.${idx}.value`,e.target.value)} className="border border-slate-200 rounded px-2 py-1 text-sm bg-white focus:outline-none ef"/>
                                        ):(
                                            <span className="text-sm text-slate-800 pl-2 border-l-2 border-slate-200">{item.value}</span>
                                        )}
                                    </div>
                                ))}
                            </div>
                            {editMode&&<button onClick={()=>addDetail(selName)} className="flex items-center gap-1 w-full justify-center py-2 rounded-lg text-xs font-bold bg-slate-50 text-slate-500 border border-dashed border-slate-300 hover:border-blue-300 hover:text-blue-600"><Plus size={13}/>添加字段</button>}
                        </div>
                    </div>
                    </>
                )}
            </div>
        </div>

        {showArchive&&(
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm" onClick={()=>setShowArchive(false)}>

                    <div className="flex items-center justify-between"><div className="flex items-center gap-2 font-bold text-sm"><ArchiveIc size={16}/>数据存档</div><button onClick={()=>setShowArchive(false)} className="text-slate-400 hover:text-slate-600"><XIcon size={16}/></button></div>
                    <p className="text-[11px] text-slate-500">导出包含所有自定义数据（各视图数值/颜色/标注/网架图），可分享或下次导入。</p>
                    <div className="flex gap-2">
                        <button onClick={handleExportJSON} className="flex-1 bg-slate-900 text-white text-xs font-bold py-2.5 rounded-lg flex items-center justify-center gap-1.5 hover:bg-slate-800"><Download size={13}/>导出JSON</button>
                        <label className="flex-1 bg-white border border-slate-200 text-slate-700 text-xs font-bold py-2.5 rounded-lg cursor-pointer hover:border-slate-300 flex items-center justify-center gap-1.5"><Upload size={13}/>导入JSON<input type="file" accept=".json" onChange={handleImportJSON} className="hidden"/></label>
                    </div>
                    <button onClick={handleExportHTML} className="w-full bg-blue-600 text-white text-xs font-bold py-2.5 rounded-lg flex items-center justify-center gap-1.5 hover:bg-blue-700"><Download size={13}/>导出完整HTML文件</button>
                </div>
            </div>
        )}

        {/* ── Preview ── */}
        {previewImg&&(
            <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6" onClick={()=>setPreviewImg(null)}>
                <div className="bg-white rounded-xl shadow-2xl overflow-hidden max-w-4xl w-full" onClick={e=>e.stopPropagation()}>
                    <div className="flex items-center justify-between px-4 py-2 border-b border-slate-100">
                        <span className="text-sm font-semibold text-slate-700">{previewImg.name||'预览'}</span>
                        <button onClick={()=>setPreviewImg(null)} className="text-slate-400 hover:text-slate-700"><XIcon size={16}/></button>
                    </div>
                    <div className="max-h-[80vh] overflow-auto bg-slate-50"><img src={previewImg.src} alt="" className="w-full object-contain"/></div>
                </div>
            </div>
        )}
    </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
